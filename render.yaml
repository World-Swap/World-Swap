services:
  - type: web
    name: world-swap
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: TEST_MODE
        value: "true"
      - key: DATABASE_URL
        sync: false          # set in dashboard (Neon)
      - key: ASSET_ENCRYPTION_KEY
        generateValue: true  # Render generates a random secret
      - key: SESSION_SECRET
        generateValue: true  # signs sign-in cookies

